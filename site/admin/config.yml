backend:
  name: git-gateway
  branch: main

media_folder: "assets/img/uploads"
public_folder: "assets/img/uploads"

locale: "fr"

collections:
  - name: "reglages"
    label: "Réglages du site"
    editor:
      preview: false
    files:
      - name: "settings"
        label: "Logo, cagnotte et réseaux sociaux"
        file: "data/settings.json"
        fields:
          - { label: "Logo", name: "logo", widget: "image", required: false, hint: "Remplace l'icône par défaut dans le menu, sur toutes les pages." }
          - { label: "Lien vers la cagnotte", name: "cagnotte_lien", widget: "string", required: false }
          - { label: "Montant actuel collecté (en €, juste le nombre)", name: "cagnotte_montant_actuel", widget: "number", required: false }
          - { label: "Objectif de la cagnotte (en €, juste le nombre)", name: "cagnotte_objectif", widget: "number", required: false }
          - { label: "Lien Facebook", name: "facebook", widget: "string", required: false }
          - { label: "Lien Instagram", name: "instagram", widget: "string", required: false }
          - { label: "Lien groupe WhatsApp", name: "whatsapp", widget: "string", required: false }

  - name: "vlog"
    label: "Vlog"
    folder: "data/vlog"
    create: true
    slug: "{{date}}-{{slug}}"
    identifier_field: "title"
    editor:
      preview: false
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Texte", name: "excerpt", widget: "text" }
      - name: "images"
        label: "Photos (glisse-en une ou plusieurs, défilables sur le site)"
        widget: "list"
        required: false
        field: { label: "Photo", name: "src", widget: "image" }

  - name: "historique"
    label: "Historique (frise)"
    folder: "data/timeline"
    create: true
    slug: "{{year}}-{{slug}}"
    identifier_field: "title"
    editor:
      preview: false
    fields:
      - { label: "Année", name: "year", widget: "string" }
      - { label: "Titre de l'événement", name: "title", widget: "string" }
      - { label: "Description", name: "text", widget: "text" }

  - name: "visites"
    label: "Visites"
    folder: "data/visites"
    create: true
    slug: "{{date}}-{{slug}}"
    identifier_field: "title"
    editor:
      preview: false
    fields:
      - { label: "Nom de la journée", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Places restantes", name: "places_restantes", widget: "number" }
      - { label: "Adresse (pour le bouton Itinéraire)", name: "adresse", widget: "string", required: false }
